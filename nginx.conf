# nginx.conf — reverse proxy for btc-ai-backend
# Place this at: /etc/nginx/sites-available/btc-ai-backend
# Then symlink: ln -s /etc/nginx/sites-available/btc-ai-backend /etc/nginx/sites-enabled/

upstream btc_ai_backend {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;   # ← replace with your hostname or IP

    # Optional: redirect HTTP → HTTPS (uncomment when you have a cert)
    # return 301 https://$host$request_uri;

    # ── Proxy to Node ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://btc_ai_backend;
        proxy_http_version 1.1;

        # Keep-alive & WebSocket headers
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward (or generate) a request ID
        proxy_set_header   X-Request-Id      $request_id;

        # Timeouts — /api/ask can take a while if the model is generating
        proxy_connect_timeout  10s;
        proxy_send_timeout     90s;
        proxy_read_timeout     90s;

        # Body size — JSON payloads only, 1 MB is generous
        client_max_body_size   1m;
    }

    # ── Health check shortcut (useful for load-balancer probes) ───
    location = /health {
        proxy_pass http://btc_ai_backend/api/health;
    }

    # Block everything else
    location / {
        return 404;
    }

    # ── Logging ───────────────────────────────────────────────────
    access_log /var/log/nginx/btc-ai-backend-access.log combined;
    error_log  /var/log/nginx/btc-ai-backend-error.log warn;
}

